apiVersion: "operator.openshift.io/v1"
kind: "Network"
metadata:
  name: "cluster"
spec:
  serviceNetwork:
    - "172.30.0.0/16"
  clusterNetwork:
    - cidr: "10.128.0.0/14"
      hostPrefix: 23
  defaultNetwork:
    type: OVNKubernetes
  # installNetworkObservability enables Network Observability at cluster installation.
  # Defaults to true (opt-out model). Set to false to disable installation.
  installNetworkObservability: true
