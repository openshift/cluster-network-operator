kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: network-metrics
  namespace: openshift-multus
spec:
  podSelector:
    matchLabels:
      app: network-metrics-daemon
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
      ports:
      - port: https
