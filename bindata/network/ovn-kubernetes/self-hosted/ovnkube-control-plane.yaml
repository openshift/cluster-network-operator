# The ovnkube control-plane components
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ovnkube-control-plane
  namespace: openshift-ovn-kubernetes
  annotations:
    kubernetes.io/description: |
      This deployment launches the ovn-kubernetes controller (control-plane) networking components.
    release.openshift.io/version: "{{.ReleaseVersion}}"
spec:
  replicas: {{.ClusterManagerReplicas}}
  selector:
    matchLabels:
      app: ovnkube-control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        kubectl.kubernetes.io/default-container: ovnkube-cluster-manager
        network.operator.openshift.io/ovnkube-control-plane-config-hash: "{{.OVNKubeControlPlaneConfigHash}}"
      labels:
        app: ovnkube-control-plane
        component: network
        type: infra
        openshift.io/component: network
        kubernetes.io/os: "linux"
    spec:
      serviceAccountName: ovn-kubernetes-control-plane
      hostNetwork: true
      dnsPolicy: Default
      priorityClassName: "system-cluster-critical"
      # volumes in all containers:
      # (container) -> (host)
      # /env -> configmap env-overrides - debug overrides
      containers:
      - name: kube-rbac-proxy
        image: {{.KubeRBACProxyImage}}
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          set -euo pipefail
          . /ovnkube-lib/ovnkube-lib.sh || exit 1
          start-rbac-proxy ovn-control-plane-metrics 9108 29108 /etc/pki/tls/metrics-cert/tls.key /etc/pki/tls/metrics-cert/tls.crt
        ports:
        - containerPort: 9108
          name: https
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: ovn-control-plane-metrics-cert
          mountPath: /etc/pki/tls/metrics-cert
          readOnly: True
        - name: ovnkube-script-lib
          mountPath: /ovnkube-lib
      # ovnkube-control-plane: central component that allocates IPAM for each node in the cluster
      - name: ovnkube-cluster-manager
        image: "{{.OvnControlPlaneImage}}"
        command:
        - /bin/bash
        - -c
        - |
          set -xe
          if [[ -f "/env/_master" ]]; then
            set -o allexport
            source "/env/_master"
            set +o allexport
          fi
          
          ovn_eip_reachability_timeout_opt=
          {{- if .ReachabilityTotalTimeoutSeconds }}        
            ovn_eip_reachability_timeout_opt="--egressip-reachability-total-timeout {{.ReachabilityTotalTimeoutSeconds}}"
          {{ end }}

          ovn_v4_join_subnet_opt=
          if [[ "{{.V4JoinSubnet}}" != "" ]]; then
            ovn_v4_join_subnet_opt="--gateway-v4-join-subnet {{.V4JoinSubnet}}"
          fi
          ovn_v6_join_subnet_opt=
          if [[ "{{.V6JoinSubnet}}" != "" ]]; then
            ovn_v6_join_subnet_opt="--gateway-v6-join-subnet {{.V6JoinSubnet}}"
          fi

          ovn_v4_transit_switch_subnet_opt=
          if [[ "{{.V4TransitSwitchSubnet}}" != "" ]]; then
            ovn_v4_transit_switch_subnet_opt="--cluster-manager-v4-transit-subnet {{.V4TransitSwitchSubnet}}"
          fi
          ovn_v6_transit_switch_subnet_opt=
          if [[ "{{.V6TransitSwitchSubnet}}" != "" ]]; then
            ovn_v6_transit_switch_subnet_opt="--cluster-manager-v6-transit-subnet {{.V6TransitSwitchSubnet}}"
          fi

          ovn_v4_masquerade_subnet_opt=
          if [[ "{{.V4MasqueradeSubnet}}" != "" ]]; then
            ovn_v4_masquerade_subnet_opt="--gateway-v4-masquerade-subnet {{.V4MasqueradeSubnet}}"
          fi
          ovn_v6_masquerade_subnet_opt=
          if [[ "{{.V6MasqueradeSubnet}}" != "" ]]; then
            ovn_v6_masquerade_subnet_opt="--gateway-v6-masquerade-subnet {{.V6MasqueradeSubnet}}"
          fi

          persistent_ips_enabled_flag="--enable-persistent-ips"

          route_advertisements_enable_flag=
          if [[ "{{.OVN_ROUTE_ADVERTISEMENTS_ENABLE}}" == "true" ]]; then
            route_advertisements_enable_flag="--enable-route-advertisements"
          fi
          
          evpn_enable_flag=
          if [[ "{{.OVN_EVPN_ENABLE}}" == "true" ]]; then
            evpn_enable_flag="--enable-evpn"
          fi

          if [ "{{.OVN_GATEWAY_MODE}}" == "shared" ]; then
            gateway_mode_flags="--gateway-mode shared"
          elif [ "{{.OVN_GATEWAY_MODE}}" == "local" ]; then
            gateway_mode_flags="--gateway-mode local"
          else
            echo "Invalid OVN_GATEWAY_MODE: \"{{.OVN_GATEWAY_MODE}}\". Must be \"local\" or \"shared\"."
            exit 1
          fi

          # DROP: remove when older OVN-K images that require --enable-interconnect are no longer supported
          enable_interconnect_flag=
          if /usr/bin/ovnkube --help 2>&1 | grep -q -- '--enable-interconnect'; then
            enable_interconnect_flag="--enable-interconnect"
          fi

          echo "I$(date "+%m%d %H:%M:%S.%N") - ovnkube-control-plane - start ovnkube --init-cluster-manager ${K8S_NODE}"
          exec /usr/bin/ovnkube \
            ${enable_interconnect_flag} \
            --enable-multicast \
            --init-cluster-manager "${K8S_NODE}" \
            --config-file=/run/ovnkube-config/ovnkube.conf \
            --loglevel "${OVN_KUBE_LOG_LEVEL}" \
            --metrics-bind-address "127.0.0.1:29108" \
            --metrics-enable-pprof \
            --metrics-enable-config-duration \
            ${ovn_v4_join_subnet_opt} \
            ${ovn_v6_join_subnet_opt} \
            ${ovn_v4_transit_switch_subnet_opt} \
            ${ovn_v6_transit_switch_subnet_opt} \
            ${ovn_v4_masquerade_subnet_opt} \
            ${ovn_v6_masquerade_subnet_opt} \
            ${persistent_ips_enabled_flag} \
            ${gateway_mode_flags} \
            ${route_advertisements_enable_flag} \
            ${evpn_enable_flag} \
            ${ovn_eip_reachability_timeout_opt}
        volumeMounts:
        - mountPath: /run/ovnkube-config/
          name: ovnkube-config
        - mountPath: /env
          name: env-overrides
        resources:
          requests:
            cpu: 10m
            memory: 300Mi
        env:
        - name: OVN_KUBE_LOG_LEVEL
          value: "4"
        - name: K8S_NODE
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME  # standalone cluster manager will read POD_NAME and use it as its identity for leader election
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        ports:
        - name: metrics-port
          containerPort: 29108
        terminationMessagePolicy: FallbackToLogsOnError
      nodeSelector:
        node-role.kubernetes.io/master: ""
        kubernetes.io/os: "linux"
      volumes:
      - name: ovnkube-config
        configMap:
          name: ovnkube-config
      - name: env-overrides
        configMap:
          name: env-overrides
          optional: true
      - name: ovn-control-plane-metrics-cert
        secret:
          secretName: ovn-control-plane-metrics-cert
          optional: true
      - name: ovnkube-script-lib
        configMap:
          name: ovnkube-script-lib
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
      - key: "node.kubernetes.io/network-unavailable"
        operator: "Exists"
