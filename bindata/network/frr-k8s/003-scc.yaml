apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: frr-k8s
  annotations:
    kubernetes.io/description: >-
      Custom SCC for FRR-K8s.
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: true
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
  - CHOWN
  - DAC_OVERRIDE
  - KILL
  - NET_ADMIN
  - NET_BIND_SERVICE
  - NET_RAW
  - SETGID
  - SETUID
  - SYS_ADMIN
defaultAddCapabilities:
  - DAC_OVERRIDE
fsGroup:
  type: MustRunAs
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - projected
  - secret
users: []
groups: []
priority: null
